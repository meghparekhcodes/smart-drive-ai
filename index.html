<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart Drive AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#0f0f0f;
            color:white;
            min-height:100vh;
            overflow-x:hidden;
        }

        .container{
            width:90%;
            max-width:1200px;
            margin:auto;
            padding:40px 0;
        }

        .hero{
            text-align:center;
            margin-bottom:50px;
        }

        .hero h1{
            font-size:60px;
            margin-bottom:15px;
            background:linear-gradient(90deg,#8a2be2,#00d4ff);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .hero p{
            color:#aaa;
            font-size:18px;
        }

        .search-box{
            background:#181818;
            padding:30px;
            border-radius:20px;
            margin-bottom:40px;
            box-shadow:0 0 30px rgba(138,43,226,0.2);
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
        }

        input,
        select{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:#222;
            color:white;
            font-size:16px;
            outline:none;
        }

        button{
            margin-top:20px;
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:linear-gradient(90deg,#8a2be2,#00d4ff);
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
            font-weight:600;
        }

        button:hover{
            transform:scale(1.02);
            opacity:0.9;
        }

        #results{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
            gap:25px;
        }

        .card{
            background:#181818;
            border-radius:20px;
            overflow:hidden;
            transition:0.3s;
            box-shadow:0 0 20px rgba(0,0,0,0.5);
        }

        .card:hover{
            transform:translateY(-8px);
        }

        .card img{
            width:100%;
            height:220px;
            object-fit:cover;
        }

        .card-content{
            padding:20px;
        }

        .card-content h2{
            margin-bottom:10px;
            text-transform:capitalize;
        }

        .tag{
            display:inline-block;
            background:#8a2be2;
            padding:6px 12px;
            border-radius:30px;
            font-size:12px;
            margin-top:10px;
        }

        .price{
            font-size:24px;
            margin-top:15px;
            color:#00d4ff;
            font-weight:600;
        }

        .loading{
            text-align:center;
            font-size:22px;
            margin-top:40px;
        }

        .message{
            text-align:center;
            font-size:20px;
            margin-top:30px;
            color:#aaa;
        }

        @media(max-width:768px){

            .hero h1{
                font-size:40px;
            }

            .hero p{
                font-size:16px;
            }

        }

    </style>

</head>

<body>

    <div class="container">

        <div class="hero">

            <h1>🚗 Smart Drive AI</h1>

            <p>
                Discover the perfect car recommendation powered by AI
            </p>

        </div>

        <div class="search-box">

            <div class="grid">

                <input
                    type="text"
                    id="budget"
                    placeholder="Enter Budget (Example: 1000000)"
                >

                <input
                    type="text"
                    id="brand"
                    placeholder="Enter Brand (Example: Tata)"
                >

                <select id="fuel">

                    <option value="">
                        Select Fuel Type
                    </option>

                    <option value="petrol">
                        Petrol
                    </option>

                    <option value="diesel">
                        Diesel
                    </option>

                    <option value="electric">
                        Electric
                    </option>

                    <option value="cng">
                        CNG
                    </option>

                </select>

                <input
                    type="text"
                    id="search"
                    placeholder="Search Car Name"
                >

            </div>

            <button onclick="getRecommendations()">
                Get AI Recommendations
            </button>

        </div>

        <div id="results"></div>

    </div>

    <script>

        async function getRecommendations(){

            const results = document.getElementById("results");

            results.innerHTML = `
                <div class="loading">
                    Finding Best Cars...
                </div>
            `;

            const budget = document.getElementById("budget").value;

            const brand = document.getElementById("brand").value;

            const fuel = document.getElementById("fuel").value;

            const search = document.getElementById("search").value;

            try{

                const response = await fetch('/recommend', {

                    method:'POST',

                    headers:{
                        'Content-Type':'application/json'
                    },

                    body:JSON.stringify({

                        budget:budget,

                        brand:brand,

                        fuel:fuel,

                        search:search

                    })

                });

                const data = await response.json();

                results.innerHTML = "";

                if(!data.recommendations || data.recommendations.length === 0){

                    results.innerHTML = `
                        <div class="message">
                            ${data.message || "No cars found"}
                        </div>
                    `;

                    return;
                }

                data.recommendations.forEach(car => {

                    results.innerHTML += `

                        <div class="card">

                            <img src="${car.image}" alt="car">

                            <div class="card-content">

                                <h2>${car.name}</h2>

                                <p>
                                    Brand: ${car.brand}
                                </p>

                                <p>
                                    Fuel: ${car.fuel}
                                </p>

                                <div class="tag">
                                    AI Recommended
                                </div>

                                <div class="price">
                                    ₹${Number(car.price_in_inr).toLocaleString()}
                                </div>

                            </div>

                        </div>

                    `;

                });

            }

            catch(error){

                results.innerHTML = `

                    <div class="message">

                        Something went wrong.

                    </div>

                `;

                console.log(error);

            }

        }

    </script>

</body>
</html>
